services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: contract-management
      MYSQL_USER: osci
      MYSQL_PASSWORD: osci1!#
      MYSQL_ROOT_PASSWORD: root1!#
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # INTERNAL: 컨테이너 간 통신용(kafka-ui 등), EXTERNAL: 호스트(localhost)에서 접속용
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # 단일 브로커 환경 - 복제 관련 설정을 모두 1로 낮춰야 함 (기본값 3이면 __consumer_offsets 생성이 실패해 코디네이터를 못 찾음)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # Kafka 토픽/메시지를 웹 UI로 확인하기 위한 용도 (선택, 없어도 동작에는 무방)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # 컨테이너 내부 통신이므로 INTERNAL 리스너(kafka:29092)로 접속해야 함
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  # 로컬 LLM (계약서 정보 추출용) - API Key 불필요
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
      sleep 5 &&
      ollama pull exaone3.5:2.4b &&
      wait"

  # 이미지(수기계약서) OCR - REST API로 호출, 로컬 Tesseract 설치 불필요
  ocr:
    image: hertzg/tesseract-server:latest
    ports:
      - "8884:8884"
    environment:
      TESSERACT_SERVER_INSTALL_LANGUAGES: kor

volumes:
  mysql-data:
  ollama-data: